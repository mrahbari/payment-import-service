# Optional: in-cluster PostgreSQL for local clusters (minikube, kind) only. Do not use as-is in production.
# Apply after namespace exists: kubectl apply -f k8s/examples/dev-postgres.yaml
# Then create `payment-db` to match the service DNS `postgres` and DB name `payment_db` (see docs/container-and-k8s.md).
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: payment-import
  labels:
    app.kubernetes.io/name: postgres
spec:
  type: ClusterIP
  ports:
    - name: pg
      port: 5432
      targetPort: pg
  selector:
    app.kubernetes.io/name: postgres
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: payment-import
  labels:
    app.kubernetes.io/name: postgres
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgres
    spec:
      securityContext:
        fsGroup: 999
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: postgres
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: pg
              containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: payment_db
            - name: POSTGRES_USER
              value: user
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: password
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          livenessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U user -d payment_db"]
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U user -d payment_db"]
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsUser: 999
            runAsGroup: 999
            capabilities:
              drop: [ALL]
      volumes:
        - name: data
          emptyDir: {}
---
# Example password secret (replace the value; do not commit real production secrets)
apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
  namespace: payment-import
type: Opaque
stringData:
  password: "change-me-in-cluster"
